# Render Blueprint - Caviar CRM Backend
# 自动创建 MySQL + 后端 Web 服务
# 使用方式：render-cli blueprint deploy --file render.yaml

services:
  # ── MySQL 数据库 ────────────────────────────────────────────────────────────
  - type: database
    name: caviar-crm-db
    plan: free
    databaseName: caviar_crm
    ipAllowList: []

  # ── Flask 后端 Web 服务 ──────────────────────────────────────────────────────
  - type: web
    name: caviar-crm-backend
    plan: free
    region: oregon
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "backend.app:app" --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      # MySQL 连接（Render MySQL 自动注入 DATABASE_URL）
      - key: DATABASE_URL
        fromDatabase:
          name: caviar-crm-db
          property: connectionString
      # DeepSeek AI（请在 Render Dashboard 中填入你的 Key）
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: AI_SEARCH_API_KEY
        sync: false
      - key: AI_SEARCH_MODEL
        value: deepseek-chat
      # CORS 允许 Netlify
      - key: CORS_ORIGINS
        value: https://caviar-crm.netlify.app
