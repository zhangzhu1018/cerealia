[build]
  command = "cd frontend && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "18"

# ── Functions 目录 ──────────────────────────────────────────────────────────
[functions]
  directory = "frontend/netlify/functions"

# ── SPA fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "cd frontend && npm run build"

[context.deploy-preview]
  command = "cd frontend && npm run build"
