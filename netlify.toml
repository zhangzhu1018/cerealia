[build]
  command = "cd frontend && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "18"

# ── Edge Functions 全局配置 ────────────────────────────────────────────────
[functions]
  directory = "frontend/netlify/functions"
  node_bundler = "esbuild"

# ── API 反向代理（Edge Function 模式，更可靠）────────────────────────────
# [[redirects]] 已由 Edge Function proxy.js 替代，无需配置

# ── SPA 路由 fallback ─────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "cd frontend && npm run build"

[context.deploy-preview]
  command = "cd frontend && npm run build"
