version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: caviar_mysql
    environment:
      MYSQL_ROOT_PASSWORD: caviar2024
      MYSQL_DATABASE: caviar_crm
    ports:
      - "3306:3306"
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - caviar_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caviar_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caviar_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: caviar2024
      DB_NAME: caviar_crm
      FLASK_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - caviar_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: caviar_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - caviar_net

networks:
  caviar_net:
    driver: bridge

volumes:
  caviar_mysql_data:
